{% extends "base.html" %}

{% block content %}

<div class="row">

<div class="col-md-6">

<h4>Biblioteca</h4>

<input
class="form-control mb-3"
id="buscar"
placeholder="Buscar canción">

<form method="POST" action="/crear_setlist">

<div id="lista">

{% for cancion in canciones %}

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
name="canciones"
value="{{cancion}}">

<label class="form-check-label">

{{cancion}}

</label>

</div>

{% endfor %}

</div>

<button
class="btn btn-primary mt-3"
type="submit">

Crear Setlist

</button>

</form>

</div>

<div class="col-md-6">

<h4>Subir canción</h4>

<form
method="POST"
action="/subir"
enctype="multipart/form-data">

<input
type="file"
name="archivo"
class="form-control">

<button
class="btn btn-success mt-2">

Subir PDF

</button>

</form>

</div>

</div>

<script>

const buscador =
document.getElementById("buscar")

const lista =
document.getElementById("lista")

buscador.addEventListener(
"keyup",
function(){

let filtro =
buscador.value.toLowerCase()

let items =
lista.getElementsByClassName(
"form-check"
)

for(let i=0;i<items.length;i++){

let texto =
items[i].innerText.toLowerCase()

if(texto.includes(filtro)){

items[i].style.display=""

}else{

items[i].style.display="none"

}

}

})

</script>

{% endblock %}
