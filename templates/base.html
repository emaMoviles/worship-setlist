<!DOCTYPE html>
<html>

<head>

<title>Worship Setlist</title>
<link rel="manifest" href="/static/manifest.json">
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
<style>

body {

    background-image: url("/static/jesus_fondo.jpg");

    background-size: cover;

    background-position: center;

    background-repeat: no-repeat;

    min-height: 100vh;

}


/* capa para que el texto se vea bien */

.contenedor-app {

    background-color: rgba(0,0,0,0.65);

    padding: 30px;

    border-radius: 12px;

    color: white;

}
@media (max-width: 768px) {

    .contenedor-app {

        padding: 20px;

        border-radius: 0;

    }

}

</style>
</head>

<body>


<div class="container mt-4 contenedor-app">

<h2 class="mb-4">
Worship Setlist Manager
</h2>

{% block content %}
{% endblock %}

</div>

</body>
</html>
